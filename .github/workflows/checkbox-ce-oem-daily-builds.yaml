name: checkbox-ce-oem daily builds
permissions:
  contents: read
  actions: read # used by gh api
on:
  schedule:
    - cron: '00 01 * * *'
  workflow_dispatch:

jobs:
  check_for_commits:
    runs-on:
      group: "Canonical self-hosted runners"
      labels:
        - self-hosted
        - linux
        - jammy
        - large
        - X64
    name: Check for commits
    outputs:
      new_commit_count: ${{ steps.commit_check.outputs.new_commit_count }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check for commits
        id: commit_check
        run: |
          # Trigger daily builds when there are recent changes in the CE OEM provider.
          recent_commits=$(git log --since="24 hours ago" --oneline -- contrib/checkbox-ce-oem)
          commit_count=$(printf "%s\n" "$recent_commits" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "Recent commits in contrib/checkbox-ce-oem (last 24 hours):"
          if [ "$commit_count" -gt 0 ]; then
            printf "%s\n" "$recent_commits"
          else
            echo "(none)"
          fi
          echo "Found $commit_count commits in contrib/checkbox-ce-oem in the last 24 hours."
          echo "new_commit_count=$commit_count" >> "$GITHUB_OUTPUT"

  checkbox-ce-oem-snap-cross-build-upload-daily:
    needs: check_for_commits
    if: ${{ needs.check_for_commits.outputs.new_commit_count != '0' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/checkbox-ce-oem-daily-cross-builds.yaml
    secrets:
      SNAPCRAFT7_CREDS: ${{ secrets.SNAPCRAFT7_CREDS }}
    with:
      store_upload: true

  checkbox-ce-oem-snap-native-build-upload-daily:
    needs: check_for_commits
    if: ${{ needs.check_for_commits.outputs.new_commit_count != '0' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/checkbox-ce-oem-daily-native-builds.yaml
    secrets:
      SNAPCRAFT7_CREDS: ${{ secrets.SNAPCRAFT7_CREDS }}
    with:
      store_upload: true
