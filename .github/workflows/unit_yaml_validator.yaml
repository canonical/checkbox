name: Validate unit YAML files

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/units/*.yaml'
      - '**/units/*/*.yaml'
  workflow_dispatch:

jobs:
  validate_unit_yaml:
    name: Validate unit YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Checkbox monorepo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Install validate tool
        run: uv tool install ./unit_json_schema/validate
      - name: Validate unit YAML files
        run: |
          find . -path '*/units/**' -name "*.yaml" -print0 \
            | xargs -0 validate unit_json_schema/unit.schema.json
