name: Validate unit YAML files

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/units/*.yaml'
      - '**/units/*/*.yaml'
  workflow_dispatch:

jobs:
  validate_unit_yaml:
    name: Validate unit YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Checkbox monorepo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install validate tool
        run: uv tool install ./unit_json_schema/validate
      - name: Validate unit YAML files
        run: |
          find . -path '*/units/**' -name "*.yaml" -print0 \
            | xargs -0 validate unit_json_schema/unit.schema.json
