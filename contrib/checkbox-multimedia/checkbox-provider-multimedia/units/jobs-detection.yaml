plugin: shell
id: multimedia/va-api-detect
category_id: multimedia
summary: Detect VA-API hardware video acceleration
imports:
  - from com.canonical.plainbox import manifest
  - from com.canonical.certification import package
requires:
  - package.name == 'vainfo'
  - manifest.has_hw_video_accel == 'True'
command: |
  vainfo 2>&1
estimated_duration: 5.0
---
plugin: shell
id: multimedia/vdpau-detect
category_id: multimedia
summary: Detect VDPAU hardware video acceleration
imports:
  - from com.canonical.plainbox import manifest
  - from com.canonical.certification import package
