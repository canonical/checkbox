name: checkbox-oem
summary: Checkbox OEM test runner and public providers for 26.04 classic
description: "Checkbox OEM test runner and public providers for 26.04 classic"
confinement: classic
grade: stable

version: '0.4.0'

base: core26

apps:
  checkbox-cli:
    command-chain: [bin/wrapper_local]
    command: bin/checkbox-cli-wrapper
  configure:
    command-chain: [bin/wrapper_local]
    command: bin/configure
  remote-slave:
    command-chain: [bin/wrapper_local]
    command: bin/checkbox-cli-wrapper slave
    daemon: simple
    restart-condition: on-failure
  shell:
    command-chain: [bin/wrapper_local]
    command: bin/shell-wrapper
  test-runner:
    command-chain: [bin/wrapper_local]
    command: bin/test-runner

passthrough:
  hooks:
    configure:
      command-chain: [bin/wrapper_local]

parts:
  checkbox-provider-oem:
    plugin: dump
    source: checkbox-provider-oem
    source-type: local
    override-build: |
      export PYTHONPATH=/snap/checkbox26/current/lib/python3.14/site-packages/:/usr/lib/python3/dist-packages
      for path in $(find "/snap/checkbox26/current/providers/" -mindepth 1 -maxdepth 1 -type d); do export PROVIDERPATH=$path${PROVIDERPATH:+:$PROVIDERPATH}; done
      python3 manage.py build
      python3 manage.py install --layout=relocatable --prefix=/providers/checkbox-provider-oem --root="$CRAFT_PART_INSTALL"
    build-snaps:
      - checkbox26
    build-attributes:
      - enable-patchelf
    build-packages:
      - intltool
      - gcc
      - make
      - flake8
      - bats
      - shellcheck
      - python3
      - python3-jinja2
      - python3-packaging
    stage-packages:
      - bzip2
      - curl
      - git
      - iputils-ping
      - i2c-tools
      - jq
      # - libopenscap25t64
      - lsb-release
      - modemmanager
      # - msr-tools
      - openscap-scanner
      - pciutils
      - python3
      - python3-apt
      - python3-pip
      # - smbios-utils
      - ubuntu-report
      - xautomation
      - wget
  launchers:
    plugin: dump
    source: launchers/
    build-attributes: [no-patchelf]
    organize:
      '*': bin/
  config-variables:
    plugin: dump
    source: config/
    build-attributes: [no-patchelf]
