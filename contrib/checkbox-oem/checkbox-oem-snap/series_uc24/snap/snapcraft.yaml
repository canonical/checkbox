name: checkbox-oem
summary: Checkbox OEM test runner and public providers
description: "Checkbox OEM test runner and public providers"
confinement: strict
grade: stable

version: '1.0-noble'

base: core24

plugs:
  checkbox-runtime:
    interface: content
    target: $SNAP/checkbox-runtime
    default-provider: checkbox24
  provider-resource:
    interface: content
    target: $SNAP/providers/checkbox-provider-resource
    default-provider: checkbox24
  provider-checkbox:
    interface: content
    target: $SNAP/providers/checkbox-provider-checkbox
    default-provider: checkbox24
  provider-tpm2:
    interface: content
    target: $SNAP/providers/checkbox-provider-tpm2
    default-provider: checkbox24
  provider-certification-client:
    interface: content
    target: $SNAP/providers/checkbox-provider-certification-client
    default-provider: checkbox24
  provider-ce-oem:
    interface: content
    target: $SNAP/providers/checkbox-provider-ce-oem

apps:
  checkbox-cli:
    command-chain: [bin/wrapper_local]
    command: bin/checkbox-cli-wrapper
    plugs: &standard [home, network-bind, hardware-observe, bluez, bluetooth-control,
      gpio, modem-manager, mount-observe, network-manager, pulseaudio, serial-port,
      system-observe, tpm, timezone-control, timeserver-control]
  configure:
    command-chain: [bin/wrapper_local]
    command: bin/configure
  remote-slave:
    command-chain: [bin/wrapper_local]
    command: bin/checkbox-cli-wrapper slave
    daemon: simple
    restart-condition: on-failure
    plugs: *standard
  shell:
    command-chain: [bin/wrapper_local]
    command: bin/shell-wrapper
    plugs: *standard
  test-runner:
    command-chain: [bin/wrapper_local]
    command: bin/test-runner
    plugs: *standard

passthrough:
  hooks:
    configure:
      command-chain: [bin/wrapper_local]

slots:
  provider-oem:
    interface: content
    read:
      - $SNAP/providers/checkbox-provider-oem

package-repositories:
  - type: apt
    ppa: checkbox-dev/edge # used to pull the installation machinery

parts:
  checkbox-provider-oem:
    plugin: dump
    source: checkbox-provider-oem
    source-type: local
    build-environment:
      - PYTHONPYCACHEPREFIX: "/tmp"
    build-packages:
      - checkbox-ng
      - intltool
      - gcc
      - make
      - flake8
      - bats
      - shellcheck
      - python3
      - python3-jinja2
      - python3-packaging
    stage-packages:
      - bzip2
      - curl
      - git
      - iputils-ping
      - i2c-tools
      - jq
      - libopenscap25t64
      - lsb-release
      - modemmanager
      - msr-tools
      - openscap-scanner
      - pciutils
      - python3
      - python3-apt
      - python3-pip
      - smbios-utils
      - ubuntu-report
      - xautomation
      - wget
    override-build: |
      python3 manage.py build
      python3 manage.py install --layout=relocatable --prefix=/providers/checkbox-provider-oem --root="$CRAFT_PART_INSTALL"
  extra-path-environment:
    plugin: nil
    override-build: |
      echo "LD_LIBRARY_PATH+=/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/
      " >> $CRAFT_PART_INSTALL/extra_path_environment
    stage:
      - extra_path_environment
  launchers:
    plugin: dump
    source: launchers/
    organize:
      '*': bin/
  config-variables:
    plugin: dump
    source: config/
