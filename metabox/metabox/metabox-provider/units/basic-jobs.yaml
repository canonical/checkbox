---
id: resource_names
summary: Returns names usable in templates along with their validity as an id
plugin: resource
environ:
  - CRASH
command: |
  echo "name: somename"
  echo "id_valid: True"
  echo "body: body"
  echo
  echo 'name: invalid_body'
  echo "id_valid: True"
  echo "body: 'this breaks the body"
  echo
  echo "id_valid: noname"
---
unit: template
template-resource: resource_names
template-unit: job
id: template_validation_invalid_fields_{name}
template-id: template_validation_invalid_fields
template-filter:
  - resource_names.id_valid in ["True", "False"]
command: echo Testing {body}
summary: Tests that generated units are validated and reported when invalid
flags:
  - simple
---
unit: template
template-resource: resource_names
template-unit: job
id: template_validation_missing_parameter_{name}
template-filter:
  - resource_names.id_valid == "noname"
template-id: template_validation_missing_parameter
command: |
  # note: missing params is a special case because it triggers a different kind
  #       of error that is not a validation error
  echo Testing
summary: Tests that generated units are validated and reported when params are missing
flags:
  - simple
