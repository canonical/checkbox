unit: setup job
id: simple_setup_guard
flags:
  - simple
summary: Creates a file in session share that can then be verified by normal jobs
command: echo "setup_include" > $PLAINBOX_SESSION_SHARE/setup_include_guard
---
id: simple_bootstrap_guard
summary: Creates a file in session share that can then be verified by normal jobs
plugin: resource
flags:
  - simple
command: |
  echo "bootstrap_include" > $PLAINBOX_SESSION_SHARE/bootstrap_include_guard
  echo done: true
---
id: verify_simple_guards
flags:
  - simple
summary: Verify that the simple guards were created
command: |
  if ! test -f $PLAINBOX_SESSION_SHARE/setup_include_guard; then
    echo "setup_guard didn't run"
    exit 1
  fi
  if ! test -f $PLAINBOX_SESSION_SHARE/bootstrap_include_guard; then
    echo "bootstrap_guard didn't run"
    exit 1
  fi
---
unit: test plan
id: basic_setup_include_works
name: Test that the basic functionality of setup_include works
setup_include:
  - simple_setup_guard
bootstrap_include:
  - simple_bootstrap_guard
include:
  - verify_simple_guards
---
unit: setup job
id: setup_restart
summary: Restarts Checkbox during setup (simulates machine reboot)
plugin: shell
user: root
flags:
  - noreturn
command: |
  PID=`pgrep -f checkbox-cli`
  kill $PID
---
unit: setup job
id: setup_restart_guard
summary: Creates a file in session share that can then be verified by normal jobs
plugin: shell
command: echo "setup_restart" > $PLAINBOX_SESSION_SHARE/setup_restart_guard
---
id: verify_resume_guards
flags:
  - simple
command: |
  if ! test -f $PLAINBOX_SESSION_SHARE/setup_restart_guard; then
    echo "setup_restart_guard didn't run"
  fi
---
unit: test plan
id: resume_setup_include_works
name: Test that setup include can resume a test run
setup_include:
  - simple_setup_guard
  - setup_restart
  - setup_restart_guard
bootstrap_include:
  - simple_bootstrap_guard
include:
  - verify_simple_guards
  - verify_resume_guards
---
unit: manifest entry
id: setup_manifest_false
name: Setup manifest to be shown before running manifest that has to be false
value-type: bool
---
unit: manifest entry
id: _setup_manifest_hidden
name: Setup manifest hidden from the UI
value-type: bool
---
unit: manifest entry
id: setup_job_manifest
name: Setup job manifest question shown
value-type: bool
---
unit: setup job
id: setup_job_requiring_manifest
flags: [simple]
requires_manifest:
  - setup_job_manifest
  - setup_manifest_false: false
  - _setup_manifest_hidden
command: |
  echo "setup_ran" > $PLAINBOX_SESSION_SHARE/setup_manifest_guard
---
id: verify_setup_manifest_ran
flags: [simple]
imports:
  - from com.canonical.plainbox import manifest
command: |
  if test -f $PLAINBOX_SESSION_SHARE/setup_manifest_guard; then
    echo "setup job ran correctly"
  else
    echo "setup job did not run"
    exit 1
  fi
---
id: manifest_menu_setup_job_tp
unit: test plan
name: Test manifest menu shown for setup job
setup_include:
  - setup_job_requiring_manifest
include:
  - verify_setup_manifest_ran
