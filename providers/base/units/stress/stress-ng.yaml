plugin: shell
category_id: com.canonical.plainbox::stress
id: stress/store_and_change_oomd_config
estimated_duration: '3.0'
user: root
summary: Store and change 10-oomd-user-service-defaults.conf
command: |
  systemd_oomd_conf_path=/usr/lib/systemd/system/user@.service.d/10-oomd-user-service-defaults.conf
  if [ -e ${systemd_oomd_conf_path} ]; then
    echo "Storing original oomd config..."
    cat ${systemd_oomd_conf_path} > "$PLAINBOX_SESSION_SHARE"/10-oomd-user-service-defaults.conf
    echo "Before changing config (Original config):"
    cat ${systemd_oomd_conf_path}
    echo
    echo "Changing oomd config to auto..."
    sed -i 's/ManagedOOMMemoryPressure=kill/ManagedOOMMemoryPressure=auto/g' ${systemd_oomd_conf_path}
    systemctl daemon-reload
    echo "After changing config:"
    cat ${systemd_oomd_conf_path}
  else
    echo "Config doesn't exist."
    echo "Won't change anything"
  fi
---
plugin: shell
category_id: com.canonical.plainbox::stress
id: stress/restore_oomd_config
depends:
  - stress/store_and_change_oomd_config
estimated_duration: '3.0'
user: root
summary: Restore to original 10-oomd-user-service-defaults.conf
command: |
  systemd_oomd_conf_path=/usr/lib/systemd/system/user@.service.d/10-oomd-user-service-defaults.conf
  if [ -e ${systemd_oomd_conf_path} ]; then
    echo "Before restoring config:"
    cat ${systemd_oomd_conf_path}
    echo
    echo "Restoring original oomd config..."
    cat "$PLAINBOX_SESSION_SHARE"/10-oomd-user-service-defaults.conf > ${systemd_oomd_conf_path}
    systemctl daemon-reload
    echo "After restoring config (Original config):"
    cat ${systemd_oomd_conf_path}
  else
    echo "Config doesn't exist."
    echo "Won't restore anything."
  fi
---
# An enabled systemd runtime (hardware) watchdog can reset the DUT while
# stress-ng stressors starve the system, aborting the whole run. Disable it
# for the duration of the stress-ng tests and restore it afterwards.
# The stressor templates above carry group/after/before fields so the
# stressor jobs always run between these two jobs regardless of the test
# plan include order.
# See https://warthogs.atlassian.net/browse/PERI-991 (original issue) and
# https://warthogs.atlassian.net/browse/OEMQA-6781 (generic migration).
plugin: shell
category_id: com.canonical.plainbox::stress
id: stress/store_and_disable_watchdog
group: stress-ng
estimated_duration: '3.0'
user: root
summary: Store the systemd runtime watchdog state and disable it
purpose: |
  Records the current RuntimeWatchdog setting and, only if the watchdog is
  enabled, disables it with a systemd drop-in so stress-ng cannot trigger a
  watchdog reset. If the watchdog is already disabled, nothing is changed.
command: stress_ng_watchdog.py disable
---
plugin: shell
category_id: com.canonical.plainbox::stress
id: stress/restore_watchdog
group: stress-ng
depends:
  - stress/store_and_disable_watchdog
estimated_duration: '3.0'
user: root
summary: Restore the systemd runtime watchdog to its original state
purpose: |
  Removes the drop-in created by stress/store_and_disable_watchdog so the
  runtime watchdog returns to its original configuration. If the watchdog
  was already disabled before the run, nothing was changed and nothing is
  restored.
command: stress_ng_watchdog.py restore
